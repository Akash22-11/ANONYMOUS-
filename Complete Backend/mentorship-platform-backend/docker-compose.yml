version: '3.9'

services:

  # PostgreSQL — Primary Database
  postgres:
    image: postgres:16-alpine
    container_name: mentorship_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mentorship_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-strongpassword123}
      POSTGRES_DB: ${POSTGRES_DB:-mentorship_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mentorship_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mentorship_user} -d ${POSTGRES_DB:-mentorship_db}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # Redis — Caching, Rate Limiting, Sessions
  redis:
    image: redis:7.2-alpine
    container_name: mentorship_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispassword123}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --loglevel notice
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - mentorship_network
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redispassword123}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis Commander — Dev UI (run: docker compose --profile dev up)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: mentorship_redis_ui
    restart: unless-stopped
    profiles: [dev]
    environment:
      REDIS_HOSTS: 'local:redis:6379:0:${REDIS_PASSWORD:-redispassword123}'
      HTTP_USER: admin
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-adminpassword}
    ports:
      - '8081:8081'
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mentorship_network

 
  # pgAdmin — Dev UI (run: docker compose --profile dev up)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mentorship_pgadmin
    restart: unless-stopped
    profiles: [dev]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@mentorship.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-adminpassword}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - '5050:80'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mentorship_network

  # Backend App 
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mentorship_app
    restart: unless-stopped
    profiles: [production]
    env_file: [.env]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mentorship_user}:${POSTGRES_PASSWORD:-strongpassword123}@postgres:5432/${POSTGRES_DB:-mentorship_db}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword123}@redis:6379
      NODE_ENV: production
    ports:
      - '${PORT:-5000}:5000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mentorship_network
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads

networks:
  mentorship_network:
    driver: bridge
    name: mentorship_network

volumes:
  postgres_data:
    driver: local
    name: mentorship_postgres_data
  redis_data:
    driver: local
    name: mentorship_redis_data
  pgadmin_data:
    driver: local
    name: mentorship_pgadmin_data
